name: Deploy Portfolio CMS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-portfolio-cms
  cancel-in-progress: true

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate deployment secrets
        run: |
          for name in DATABASE_URL PAYLOAD_SECRET RAILWAY_DEPLOY_HOOK_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for deployment"
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Verify database connectivity
        run: npm run db:check

      - name: Run database migrations
        run: npm run migrate

      - name: Verify production build
        run: npm run build

      - name: Trigger Railway deployment
        run: curl -fsSL -X POST "$RAILWAY_DEPLOY_HOOK_URL"
